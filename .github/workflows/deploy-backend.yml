name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Never run two deploys at once (each applies D1 migrations + ships the Worker); queue, don't cancel.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Gate the deploy on the suite (expander unit tests + integration tests in real workerd).
      - name: Test
        run: pnpm --filter '@ember/api' --filter '@ember/backend' run test

      - name: Apply D1 migrations (remote)
        run: pnpm --filter '@ember/backend' exec wrangler d1 migrations apply ember-mass-times --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm --filter '@ember/backend' exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
