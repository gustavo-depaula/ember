name: Deploy Hearth to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'apps/hearth/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Stage Hearth files
        run: |
          cp -r content _site_hearth
          cp apps/hearth/index.html _site_hearth/index.html
          scripts/convert-webp.sh _site_hearth

          # Wrap under hearth/v1/
          mkdir -p _site/hearth
          mv _site_hearth/index.html _site/index.html
          mv _site_hearth _site/hearth/v1

      - name: Build .pray archives
        run: scripts/build-books.sh _site/hearth/v1/books

      - name: Generate manifest
        run: |
          cd _site/hearth
          echo '{' > manifest.json
          echo '  "version": "1",' >> manifest.json
          echo '  "generated": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",' >> manifest.json
          echo '  "files": {' >> manifest.json

          find v1 -type f | sort | while IFS= read -r f; do
            hash=$(sha256sum "$f" | cut -c1-12)
            size=$(stat -c%s "$f")
            echo "    \"$f\": {\"sha256\": \"$hash\", \"size\": $size},"
          done | sed '$ s/,$//' >> manifest.json

          echo '  }' >> manifest.json
          echo '}' >> manifest.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
