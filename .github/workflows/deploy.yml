name: Deploy Hearth to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'apps/hearth/**'
      - '.github/workflows/deploy.yml'
      - 'scripts/build-creator-meta.py'
  # Hourly so creator-meta (YouTube shorts classifications, podcast/RSS
  # channel images, YouTube og:image scrape) stays fresh as creators
  # upload new content. The corpus content itself rarely changes, so the
  # deploy is mostly a no-op aside from the creator-meta/ files.
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch CCC from upstream
        run: npx tsx scripts/fetch-ccc.ts

      - name: Stage Hearth files
        run: |
          cp -r content _site_hearth
          cp apps/hearth/index.html _site_hearth/index.html
          scripts/convert-webp.sh _site_hearth

          mkdir -p _site/hearth/v2
          mv _site_hearth/index.html _site/index.html

          # Auxiliary content served alongside the corpus (Bible, CCC, EF propers, etc.)
          for d in art bible catechism lectionary liturgical propers saints; do
            if [ -d "_site_hearth/$d" ]; then
              mv "_site_hearth/$d" "_site/hearth/v2/$d"
            fi
          done
          rm -rf _site_hearth

      - name: Build content corpus (Hearth v2)
        run: python3 scripts/build-corpus.py _site/hearth/v2

      - name: Build creator metadata (channel images + shorts classification)
        run: python3 scripts/build-creator-meta.py _site/hearth/v2

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
