name: EAS Update

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - 'packages/**'
      - '.github/workflows/eas-update.yml'
  workflow_dispatch:

concurrency:
  group: eas-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm --filter @ember/app exec eas update --channel production --non-interactive --message "${{ github.event.head_commit.message }}"
